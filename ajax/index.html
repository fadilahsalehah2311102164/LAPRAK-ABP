<!DOCTYPE html>
<html>
<head>
    <title>AJAX Demo</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h2>Data dari Server</h2>
<button id="btn">Ambil Data</button>
<p id="hasil"></p>

<script>
$("#btn").click(function() {
    $.ajax({
        url: "data.txt",
        method: "GET",
        success: function(response) {
            $("#hasil").html(response);
        },
        error: function() {
            $("#hasil").html("Gagal ambil data");
        }
    });
});
</script>

</body>
</html>
